<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INICIAR SESIÓN</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ:wght@300&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="is-styles.css">
    <style>
        header img {
            width: 80%;
            height: auto;
        }
        .login-container {
            max-width: 600px;
            background-color: #f8f9fa;
            border-radius: 0.5rem;
            background-color: blueviolet;
            padding: 30px;
            margin: 100px;
            height: 300px;
        }
        
        .social a {
            margin: 0 0.5rem;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header style="background-color: white;">
        <img src="https://media.istockphoto.com/photos/dogs-and-cats-peeking-over-web-banner-picture-id930281684?k=6&m=930281684&s=170667a&w=0&h=XCSh-el6G1-E242Va28BHSbzrzxLF1mm2nYmEymhsoY=" class="img-fluid" alt="Responsive image">
    </header>

    <!-- Login Form -->
    <div class="container my-5">
        <div class="login-container">
            <h3>Inicia Sesión</h3>
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label for="inputEmail3" class="form-label">Email</label>
                    <input type="email" class="form-control" id="inputEmail3" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="inputPassword3" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="inputPassword3" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2024</p>
        <div class="social">
            <h2>Social Media Icons</h2>
            <a class="fa fa-instagram" href="https://www.instagram.com/naty.luz/">naty.luzr</a>
            <a class="fa fa-yahoo" href="https://www.yahoo.com/naty.luz/">naty.luzr</a>
            <a class="fa fa-talentosdigitales" href="https://talentosdigitales.ar/">https://talentosdigitales.ar/</a>
        </div>
    </footer>
</body>
</html>
