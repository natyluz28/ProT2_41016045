<body>
    <!--Registrarse: Deberá ser un formulario de registro del Usuario donde se le
dará funcionalidad desde el BackEnd.-->
<!--registro-->
<h3>QUIERES FORMAR PARTE DE LA ORGANIZACION?</h3>
<h4>registrate ahora mismo!</h4>
<div class="registro">
        <form class="row g-3" action="/register" method="POST">
            <div class="col-md-6">
                <label for="inputName" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="inputName" name="name">
            </div>
            <div class="col-md-6">
                <label for="inputSurname" class="form-label">Apellido</label>
                <input type="text" class="form-control" id="inputSurname" name="surname">
            </div>
            <div class="col-md-6">
                <label for="inputEmail4" class="form-label">Email</label>
                <input type="email" class="form-control" id="inputEmail4" name="email">
            </div>
            <div class="col-md-6">
                <label for="inputPassword4" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="inputPassword4" name="password">
            </div>
            <div class="col-md-6">
                <label for="inputAddress" class="form-label">Dirección</label>
                <input type="text" class="form-control" id="inputAddress" name="address" placeholder="1234 Main St">
            </div>
            <div class="col-md-6">
                <label for="inputCity" class="form-label">Ciudad</label>
                <input type="text" class="form-control" id="inputCity" name="city">
            </div>
            <div class="col-md-4">
                <label for="inputState" class="form-label">Provincia</label>
                <select id="inputState" class="form-select" name="state">
                    <option selected>Selecciona...</option>
                    <option>Buenos Aires</option>
                    <option>Corrientes</option>
                    <option>Santa Fe</option>
                    <option>Chubut</option>
                </select>
            </div> 
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="gridCheck" name="agree">
                    <label class="form-check-label" for="gridCheck">Check</label>
                </div>
            </div>
            <div class="col-12">
             <div class="boton"><button type="submit" class="btn btn-outline-warning">Guardar</button> </div>  
            </div>
            <div class="col-12">
                <div class="boton"><button type="submit" class="btn btn-outline-danger">Cancelar</button></div>
            </div>
        </form>
    </div>
    

</div>
