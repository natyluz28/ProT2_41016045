<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ:wght@300&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="reg-styles.css">
    <style>
        header img {
            width: 80%;
            height: auto;
        }
        
        
        .social a {
            margin: 0 0.5rem;
            text-decoration: none;
        }
        .boton {
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header style="background-color: white;">
        <img src="https://media.istockphoto.com/photos/dogs-and-cats-peeking-over-web-banner-picture-id930281684?k=6&m=930281684&s=170667a&w=0&h=XCSh-el6G1-E242Va28BHSbzrzxLF1mm2nYmEymhsoY=" alt="Responsive image">
    </header>

    <!-- Registro -->
    <div class="container my-5">
        <h3>¿QUIERES FORMAR PARTE DE LA ORGANIZACIÓN?</h3>
        <h4>¡Regístrate ahora mismo!</h4>
        <div class="registro">
            <form class="row g-3" action="/register" method="POST">
                <div class="col-md-6">
                    <label for="inputName" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="inputName" name="name" required>
                </div>
                <div class="col-md-6">
                    <label for="inputSurname" class="form-label">Apellido</label>
                    <input type="text" class="form-control" id="inputSurname" name="surname" required>
                </div>
                <div class="col-md-6">
                    <label for="inputEmail4" class="form-label">Email</label>
                    <input type="email" class="form-control" id="inputEmail4" name="email" required>
                </div>
                <div class="col-md-6">
                    <label for="inputPassword4" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="inputPassword4" name="password" required>
                </div>
                <div class="col-md-6">
                    <label for="inputAddress" class="form-label">Dirección</label>
                    <input type="text" class="form-control" id="inputAddress" name="address" placeholder="1234 Main St" required>
                </div>
                <div class="col-md-6">
                    <label for="inputCity" class="form-label">Ciudad</label>
                    <input type="text" class="form-control" id="inputCity" name="city" required>
                </div>
                <div class="col-md-4">
                    <label for="inputState" class="form-label">Provincia</label>
                    <select id="inputState" class="form-select" name="state" required>
                        <option selected>Selecciona...</option>
                        <option>Buenos Aires</option>
                        <option>Corrientes</option>
                        <option>Santa Fe</option>
                        <option>Chubut</option>
                    </select>
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="gridCheck" name="agree" required>
                        <label class="form-check-label" for="gridCheck">Acepto los términos y condiciones</label>
                    </div>
                </div>
                <div class="col-12 boton">
                    <button type="submit" class="btn btn-outline-warning">Guardar</button>
                    <button type="reset" class="btn btn-outline-danger">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2024</p>
        <div class="social">
            <h2>Social Media Icons</h2>
            <a class="fa fa-instagram" href="https://www.instagram.com/naty.luz/">naty.luzr</a>
            <a class="fa fa-yahoo" href="https://www.yahoo.com/naty.luz/">naty.luzr</a>
            <a class="fa fa-talentosdigitales" href="https://talentosdigitales.ar/">https://talentosdigitales.ar/</a>
        </div>
    </footer>
</body>
</html>
